    <style>
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
            font-size: 16px;
            line-height: 1.6;
            color: #1f2937;
            background-color: #f9fafb;
            box-sizing: border-box;
        }
        body * { box-sizing: inherit; }

        .page-lead {
            color: #6b7280;
            font-size: 15px;
            margin: -6px 0 14px;
            line-height: 1.55;
            max-width: 40rem;
        }

        h1 { font-size: 28px; font-weight: 700; margin-bottom: 16px; }
        h2 { font-size: 22px; font-weight: 600; }
        h3 { font-size: 18px; font-weight: 600; }

        table { font-size: 15px; }
        th { font-weight: 600; background-color: #f3f4f6; }
        td { color: #374151; }

        button, a { font-weight: 500; letter-spacing: -0.2px; }

        @media (max-width: 700px) {
            body { font-size: 15px; }
            h1 { font-size: 22px; }
            h2 { font-size: 18px; }
        }

        .err { color: #c00; }
        .topnav { display: flex; flex-wrap: wrap; gap: 10px; margin: 8px 0 16px; padding: 10px 12px; background: #f8fafc; border: 1px solid #dbe4ee; border-radius: 8px; }
        .topnav a { text-decoration: none; color: #1d4ed8; font-weight: 600; }
        .topnav a:hover { text-decoration: underline; }
        .filterbar { display: flex; flex-wrap: wrap; gap: 8px 16px; margin: 8px 0 16px; padding: 10px 12px; background: #fff; border: 1px solid #dbe4ee; border-radius: 8px; align-items: center; }
        .filterbar .group { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
        .filterbar .label { font-weight: 600; color: #374151; margin-right: 4px; }
        .filterbar a { padding: 3px 10px; border-radius: 999px; border: 1px solid #cbd5e1; color: #1f2937; text-decoration: none; font-size: 13px; background: #f8fafc; }
        .filterbar a:hover { background: #e2e8f0; }
        .filterbar a.active { background: #1d4ed8; color: #fff; border-color: #1d4ed8; }
        .filter-stack { flex-direction: column; align-items: flex-start; gap: 10px; }
        .filter-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; width: 100%; }
        .filter-search { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin: 8px 0 12px; }
        .filter-search input[type="search"] { min-width: 200px; padding: 6px 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 13px; }
        .filter-search button { padding: 6px 14px; border-radius: 8px; border: 1px solid #1d4ed8; background: #1d4ed8; color: #fff; font-weight: 600; font-size: 13px; cursor: pointer; }
        .filter-search button:hover { background: #1e40af; }

        td.num-col    { text-align: center; color: #6b7280; }
        .org-col { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px; font-size: 12px; }
        .status-col { text-align: center; white-space: nowrap; }
        .date-col { white-space: nowrap; font-variant-numeric: tabular-nums; font-size: 12px; }
        td.source-col { text-align: center; padding: 4px 4px; overflow: hidden; }

        .project-table {
            width: 100%;
            table-layout: fixed;
            border-collapse: collapse;
            margin-top: 8px;
        }
        .project-table td {
            padding: 10px 8px;
            border-bottom: 1px solid #eee;
        }
        .project-table th {
            text-align: center;
            font-weight: 600;
            background: #f1f5f9;
            color: #374151;
            padding: 10px 8px;
            border-bottom: 1px solid #e2e8f0;
            white-space: nowrap;
        }
        .project-table tr:hover {
            background: #fafafa;
        }
        .title-cell {
            max-width: 0;
        }
        .title-main {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 500;
            line-height: 1.4;
        }
        .center-cell {
            text-align: center;
            vertical-align: middle;
            font-size: 13px;
        }
        .status-badge { display: inline-block; text-align: center; padding: 1px 6px; border-radius: 999px; font-size: 11px; font-weight: 600; border: 1px solid transparent; white-space: nowrap; }
        .status-open    { background: #dcfce7; color: #166534; border-color: #bbf7d0; }
        .status-closed  { background: #fee2e2; color: #991b1b; border-color: #fecaca; }
        .status-unknown { background: #f1f5f9; color: #475569; border-color: #e2e8f0; }
        .source-tag { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 11px; background: #eef2ff; color: #3730a3; border: 1px solid #c7d2fe; white-space: nowrap; }

        /* --- 요약 카드 그리드 (상단 대시보드) --- */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin: 8px 0 16px;
        }
        .summary-card {
            background: #fff;
            border: 1px solid #dbe4ee;
            border-radius: 10px;
            padding: 12px 14px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
        }
        .summary-label { font-size: 12px; color: #6b7280; font-weight: 500; }
        .summary-value { font-size: 22px; color: #111827; font-weight: 700; line-height: 1.1; font-variant-numeric: tabular-nums; }

        .top-clicked-box { margin:16px 0; padding:14px; border:1px solid #e5e7eb; border-radius:14px; background:#fff7ed; }
        .top-clicked-title { font-weight:800; margin-bottom:10px; color:#9a3412; }
        .top-clicked-list { display:flex; flex-direction:column; gap:8px; }
        .top-clicked-item { display:flex; gap:10px; padding:10px; border-radius:10px; background:#ffffff; text-decoration:none; color:inherit; border:1px solid #fed7aa; }
        .top-clicked-rank { width:28px; height:28px; border-radius:999px; background:#f97316; color:white; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
        .top-clicked-name {
            font-weight: 700;
            line-height: 1.35;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .top-clicked-meta { margin-top: 6px; font-size: 12px; color: #6b7280; display: flex; flex-direction: column; gap: 3px; }
        .top-clicked-source { font-size: 11px; color: #9ca3af; }
        .top-clicked-stats { font-size: 12px; color: #6b7280; }

        /* --- 제목 링크 --- */
        .title-link { color: #111827; text-decoration: none; }
        .title-link:hover { color: #1d4ed8; text-decoration: underline; }

        .ai-summary-line {
            margin-top: 4px;
            font-size: 12px;
            color: #64748b;
            font-style: italic;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .recommend-label-line {
            margin-top: 2px;
            font-size: 11px;
            color: #2563eb;
            font-weight: 600;
        }

        /* --- 마감일 배지 (D-3 / D-7 / 마감) — 시각만 보정, D-day 로직은 백엔드 --- */
        .deadline-badge { display: inline-block; margin-left: 4px; font-weight: 600; font-size: 11px; padding: 2px 6px; border-radius: 6px; line-height: 1.25; }
        .deadline-danger { border: 1px solid #fecaca; background: #fff1f2; color: #b91c1c; }
        .deadline-warn { background: #fffbeb; color: #a16207; border: 1px solid #fde68a; }
        td.date-col.deadline-danger {
            border: 1px solid #fecaca;
            background: #fff1f2;
            color: #b91c1c;
            border-radius: 8px;
        }
        .summary-card.summary-card-urgent {
            border: 1px solid #fecaca;
            background: #fff1f2;
            color: #b91c1c;
        }
        .summary-card.summary-card-urgent .summary-label { color: #b91c1c; }
        .summary-card.summary-card-urgent .summary-value { color: #b91c1c; }
        @media (max-width: 700px) {
            .project-table tbody tr:has(td.date-col.deadline-danger) {
                border-color: #fed7aa;
                box-shadow: 0 8px 20px rgba(249, 115, 22, 0.08);
            }
        }

        /* --- [6] 크롤링 실행 패널 --- */
        .run-panel {
            margin: 8px 0 16px;
            padding: 14px 16px;
            background: #fff;
            border: 1px solid #dbe4ee;
            border-radius: 10px;
            box-shadow: 0 1px 2px rgba(15, 23, 42, 0.05);
        }
        .run-panel-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px 14px;
            margin-bottom: 12px;
        }
        .run-panel-header strong { font-size: 15px; color: #111827; }
        .run-meta { font-size: 12px; color: #6b7280; font-family: ui-monospace, monospace; }
        .run-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            border: 1px solid transparent;
        }
        .run-badge-idle { background: #f1f5f9; color: #475569; border-color: #e2e8f0; }
        .run-badge-running { background: #dbeafe; color: #1d4ed8; border-color: #93c5fd; }
        .run-badge-success { background: #dcfce7; color: #166534; border-color: #bbf7d0; }
        .run-badge-error { background: #fee2e2; color: #991b1b; border-color: #fecaca; }
        .run-btn-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
        .run-btn {
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            background: #f8fafc;
            color: #1f2937;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }
        .run-btn:hover:not(:disabled) { background: #e2e8f0; }
        .run-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .run-btn-primary { background: #1d4ed8; color: #fff; border-color: #1d4ed8; }
        .run-btn-primary:hover:not(:disabled) { background: #1e40af; }
        .run-btn-ghost { background: #fff; }
        .run-log-panel { margin-top: 12px; }
        .run-log-toggle {
            display: block;
            width: 100%;
            text-align: left;
            padding: 8px 10px;
            margin-bottom: 6px;
            border: 1px dashed #cbd5e1;
            border-radius: 8px;
            background: #f8fafc;
            font-size: 12px;
            font-weight: 600;
            color: #374151;
            cursor: pointer;
        }
        .run-log-toggle:hover { background: #f1f5f9; }
        .run-log-pre {
            margin: 0;
            padding: 12px;
            background: #0f172a;
            color: #e2e8f0;
            font-size: 11px;
            line-height: 1.45;
            font-family: ui-monospace, "Cascadia Code", Consolas, monospace;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .run-log-panel.collapsed .run-log-pre { display: none; }

        .pipeline-log, .run-log, .log-box, #runLog, .run-log-pre {
            max-width: 720px;
            max-height: 180px;
            overflow-y: auto;
            overflow-x: auto;
            border-radius: 12px;
            box-sizing: border-box;
        }

        /* --- 반응형: 좁은 화면에서 요약 카드 열 수 조정 --- */
        @media (max-width: 900px) {
            .summary-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 600px) {
            .summary-grid { grid-template-columns: repeat(2, 1fr); }
            .summary-value { font-size: 18px; }
        }

        .top-recommend-card { margin: 14px 0 18px; padding: 14px 16px; border: 1px solid #bfdbfe; border-radius: 12px; background: #eff6ff; }
        .top-recommend-title { font-size: 13px; font-weight: 700; color: #1d4ed8; margin-bottom: 6px; }
        .top-recommend-link { display: block; font-size: 16px; font-weight: 700; color: #111827; text-decoration: none; margin-bottom: 6px; }
        .top-recommend-link:hover { text-decoration: underline; }
        .top-recommend-label { font-size: 12px; font-weight: 600; color: #2563eb; margin-top: 4px; }
        .top-recommend-summary { font-size: 12px; color: #475569; font-style: italic; margin-top: 4px; }
        .top-recommend-meta { font-size: 11px; color: #64748b; margin-top: 6px; }
        .recommend-reason-line {
            margin-top: 4px;
            font-size: 12px;
            color: #334155;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .top-recommend-reason {
            font-size: 12px;
            color: #334155;
            margin-top: 6px;
            line-height: 1.5;
        }
        .action-col { text-align: center; }
        .btn-detail, .btn-apply {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 36px;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            text-decoration: none;
            margin: 2px;
        }
        .btn-detail { border: 1px solid #cbd5e1; color: #334155; background: #ffffff; }
        .btn-apply { border: 1px solid #2563eb; color: #ffffff; background: #2563eb; }

        .btn-favorite { height: 44px; padding: 0 16px; border-radius: 12px; border: 1px solid #facc15; background: #fffbeb; color: #92400e; font-weight: 800; font-size: 14px; cursor: pointer; }
        .mobile-search-guide { display: none; }
        .top-recommend-actions { margin-top: 10px; }

        .usage-mini-card { max-width: 520px; margin: 14px 0 18px; padding: 14px 16px; border: 1px solid #bfdbfe; border-radius: 14px; background: #eff6ff; color: #1e3a8a; }
        .usage-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
        .usage-label { font-size: 14px; font-weight: 900; }
        .usage-remain { display: inline-flex; align-items: center; justify-content: center; padding: 5px 10px; border-radius: 999px; background: #dbeafe; color: #2563eb; font-size: 13px; font-weight: 900; white-space: nowrap; }
        .usage-remain.is-zero { background: #fee2e2; color: #dc2626; }
        .usage-progress { font-size: 18px; font-weight: 900; color: #1d4ed8; margin-bottom: 6px; }
        .usage-sub { font-size: 12px; color: #64748b; line-height: 1.55; }
        .usage-sub-line { display: block; }
        .usage-sub-line + .usage-sub-line { margin-top: 4px; }
        .usage-upgrade { margin-top: 8px; padding-top: 8px; border-top: 1px dashed #bfdbfe; font-size: 12px; color: #1e40af; font-weight: 700; line-height: 1.5; }

        .ai-disclaimer {
            margin: 12px 0;
            padding: 10px 12px;
            border: 1px solid #fde68a;
            background: #fffbeb;
            color: #92400e;
            border-radius: 10px;
            font-size: 12px;
            line-height: 1.45;
        }
        .ai-disclaimer strong { margin-right: 6px; font-weight: 800; }
        .main-disclaimer { margin-top: 12px; margin-bottom: 14px; }

        @media (max-width: 700px) {
          body { padding-left: 16px; padding-right: 16px; }
          .page-lead { font-size: 14px; margin: -4px 0 12px; line-height: 1.55; max-width: none; }
          .pipeline-log, .run-log, .log-box, #runLog, .run-log-pre {
            max-width: 100%;
            max-height: 160px;
          }
          .ai-disclaimer { font-size: 12px; margin: 10px 0; padding: 10px 12px; line-height: 1.45; }
          /* 테이블 카드형 */
          .project-table, .project-table thead, .project-table tbody,
          .project-table th, .project-table td, .project-table tr {
            display: block;
          }
          .project-table thead { display: none; }
          .project-table tr {
            margin: 0 0 14px;
            padding: 16px 16px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            background: #ffffff;
          }
          .project-table td { border-bottom: none; padding: 4px 0; text-align: left; }
          .num-col, .source-col { display: none; }
          .title-cell { max-width: none; }
          .title-main, .title-link {
            -webkit-line-clamp: 2;
            font-size: 16px;
            line-height: 1.45;
            font-weight: 600;
          }
          .center-cell { text-align: left; font-size: 13px; }
          .status-col, .date-col { display: inline-block; margin-right: 8px; }
          .rec-card {
            padding: 14px;
          }

          .rec-card,
          .project-card,
          .project-table tbody tr {
            margin-bottom: 14px;
          }

          .action-col.card-actions {
            margin-top: 14px;
          }

          .btn-detail {
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
          }

          .btn-apply {
            border-radius: 12px;
            font-size: 15px;
            font-weight: 800;
          }

          .btn-favorite { width: 100%; height: 44px; margin-top: 8px; font-size: 14px; }
          .mobile-search-guide { display: block; margin: 10px 0 6px; font-size: 13px; color: #64748b; font-weight: 700; }

          /* 모바일에서 불필요한 컬럼 숨김 */
          .project-table th:nth-child(1),
          .project-table td:nth-child(1),
          .project-table th:nth-child(5),
          .project-table td:nth-child(5),
          .project-table th:nth-child(7),
          .project-table td:nth-child(7) {
            display: none !important;
          }

          /* 폰트/패딩 조정 */
          .project-table th,
          .project-table td {
            font-size: 13px;
            padding: 8px 6px;
          }

          /* 제목 영역 넓게 */
          .project-table td:nth-child(2) {
            width: 100%;
          }

          /* 필터 */
          .filter-row {
            overflow-x: auto;
            white-space: nowrap;
            padding-bottom: 6px;
          }
          .filter-row a, .filter-btn {
            display: inline-block;
            padding: 7px 12px;
            font-size: 13px;
            margin-bottom: 6px;
          }

          /* 요약 카드 1열 */
          .summary-grid {
            grid-template-columns: 1fr;
            gap: 8px;
          }

          /* TOP 추천 카드 */
          .top-recommend-card {
            padding: 16px;
          }
          .top-recommend-actions {
            display: flex;
            gap: 8px;
            align-items: center;
          }
          .top-recommend-card .btn-detail,
          .top-recommend-card .btn-apply {
            margin: 0;
          }

          .usage-mini-card { max-width: none; margin: 12px 0 16px; padding: 14px 12px; }
          .usage-head { align-items: flex-start; }
          .usage-progress { font-size: 17px; }

          .top-clicked-box { margin: 14px 0; padding: 14px 12px; }
          .top-clicked-title { font-size:16px; }
          .top-clicked-item { padding:12px; }
          .top-clicked-name { font-size:15px; }
          .top-clicked-meta { font-size:12px; }

          /* 크롤링 패널 */
          .run-panel {
            flex-direction: column;
          }
          .run-panel-left {
            display: flex;
            flex-direction: column;
            gap: 8px;
          }
          .run-btn {
            width: 100%;
            min-height: 44px;
            padding: 10px 12px;
            font-size: 14px;
            text-align: center;
          }

          #filter-box { display: none; }
          .filter-toggle-btn {
            display: block;
            width: 100%;
            padding: 10px;
            margin-bottom: 8px;
            font-size: 14px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            background: #f8fafc;
            cursor: pointer;
          }
        }

        @media (min-width: 701px) {
          .filter-toggle-btn { display: none; }
          #filter-box { display: block !important; }
        }

        #project-list { display: none; }

        .project-card {
            overflow: hidden;
            box-sizing: border-box;
        }
        .project-card,
        .project-table tbody tr {
            overflow: hidden !important;
            box-sizing: border-box;
        }

        .card-actions {
            display: flex !important;
            flex-direction: column !important;
            gap: 10px !important;
            width: 100% !important;
            max-width: 100% !important;
            box-sizing: border-box !important;
            overflow: hidden !important;
        }

        .card-actions a,
        .card-actions button {
            all: revert !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            width: 100% !important;
            max-width: 100% !important;
            min-width: 0 !important;
            min-height: 52px !important;
            box-sizing: border-box !important;
            margin: 0 !important;
            padding: 0 8px !important;
            overflow: hidden !important;
            white-space: nowrap !important;
            text-overflow: ellipsis !important;
            border-radius: 12px !important;
        }

        .card-actions a.btn-detail {
            border: 1px solid #cbd5e1 !important;
            color: #334155 !important;
            background: #ffffff !important;
            font-weight: 700 !important;
            font-size: 15px !important;
            text-decoration: none !important;
        }

        .card-actions a.btn-apply {
            border: 1px solid #2563eb !important;
            color: #ffffff !important;
            background: #2563eb !important;
            font-weight: 800 !important;
            font-size: 15px !important;
            text-decoration: none !important;
        }

        /* --- PC 전용: 테이블 열 간격·배지·액션 (모바일 카드형은 max-width:700px 블록 유지) --- */
        @media (min-width: 769px) {
            .desktop-table-wrap {
                width: 100%;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }

            .project-table {
                width: 100%;
                min-width: 1180px;
                table-layout: fixed;
                border-collapse: separate;
                border-spacing: 0;
            }

            .project-table th,
            .project-table td {
                vertical-align: middle;
                box-sizing: border-box;
                white-space: normal;
