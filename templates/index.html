<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>공고 목록</title>
    <style>
        .topnav { display: flex; flex-wrap: wrap; gap: 10px; margin: 8px 0 16px; padding: 10px 12px; background: #f8fafc; border: 1px solid #dbe4ee; border-radius: 8px; }
        .topnav a { text-decoration: none; color: #1d4ed8; font-weight: 600; }
        .topnav a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>공고 목록</h1>

    <nav class="topnav">
        <a href="{{ url_for('index') }}">공고목록</a>
        <a href="{{ url_for('new_announcements') }}">신규공고</a>
        <a href="{{ url_for('projects_list') }}">전체공고</a>
        <a href="{{ url_for('company') }}">회사정보</a>
        <a href="{{ url_for('recommend') }}">맞춤추천</a>
        <a href="{{ url_for('run_pipeline_route') }}">파이프라인 실행</a>
    </nav>

    <form method="get" action="/">
        <label>상태:
            <input type="text" name="status" value="{{ status or '' }}">
        </label>
        <label>검색어:
            <input type="text" name="q" value="{{ q or '' }}">
        </label>
        <button type="submit">검색</button>
        <a href="/">초기화</a>
    </form>

    <br>

    <table border="1">
        <tr>
            <th>ID</th>
            <th>공고명</th>
            <th>기관</th>
            <th>상태</th>
            <th>상세</th>
        </tr>

        {% for row in rows %}
        <tr>
            <td>{{ row["id"] }}</td>
            <td>{{ row["title"] }}</td>
            <td>{{ row["organization"] }}</td>
            <td>{{ row["status"] }}</td>
            <td><a href="/detail/{{ row['id'] }}">보기</a></td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
