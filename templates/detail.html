<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>공고 상세</title>
</head>
<body>
    <h1>공고 상세</h1>

    <p><strong>ID:</strong> {{ row["id"] }}</p>
    <p><strong>공고명:</strong> {{ row["title"] }}</p>
    <p><strong>기관:</strong> {{ row["organization"] }}</p>
    <p><strong>상태:</strong> {{ row["status"] }}</p>
    <p><strong>시작일:</strong> {{ row["start_date"] }}</p>
    <p><strong>종료일:</strong> {{ row["end_date"] }}</p>
    <p><strong>URL:</strong> <a href="{{ row['url'] }}" target="_blank">{{ row["url"] }}</a></p>

    <h3>설명</h3>
    <pre>{{ row["description"] or "" }}</pre>

    {% if row["pdf_path"] %}
    <p>
        <a href="/download/{{ row['pdf_path'] }}">PDF 보기</a>
        &nbsp;|&nbsp;
        <a href="/send_email/{{ row['id'] }}">이메일 발송</a>
    </p>
    {% endif %}

    <p>
        <a href="/analyze/{{ row['id'] }}">AI 분석 실행</a>
    </p>

    <p><a href="/">← 목록으로</a></p>
</body>
</html>
