<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회사정보 입력</title>
  <style>
body { font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#f9fafb; padding:24px; margin:0; }
.box { max-width:520px; margin:0 auto; background:#fff; border-radius:20px; padding:32px; border:1px solid #e5e7eb; box-shadow:0 8px 24px rgba(0,0,0,0.06); }
h1 { font-size:24px; font-weight:800; margin:0 0 20px; color:#111827; }
.topnav { display: flex; flex-wrap: wrap; gap: 10px; margin: 0 0 16px; padding: 10px 12px; background: #f8fafc; border: 1px solid #dbe4ee; border-radius: 8px; }
.topnav a { text-decoration: none; color: #1d4ed8; font-weight: 600; }
.topnav a:hover { text-decoration: underline; }
.hidden { display: none; }
#industryOtherBox { margin-top: 10px; }
.notice-box { padding:14px 16px; background:#eff6ff; border:1px solid #bfdbfe; border-radius:12px; font-size:13px; color:#1e40af; line-height:1.6; margin-bottom:24px; }
label { display:block; font-size:14px; font-weight:700; color:#374151; margin:16px 0 5px; }
input, select { width:100%; padding:11px 14px; border:1px solid #d1d5db; border-radius:10px; font-size:15px; box-sizing:border-box; color:#111827; background:#fff; }
input:focus, select:focus { outline:none; border-color:#2563eb; box-shadow:0 0 0 3px rgba(37,99,235,0.1); }
.consent-row { display:flex; align-items:flex-start; gap:10px; margin:20px 0 6px; padding:14px; background:#f9fafb; border:1px solid #e5e7eb; border-radius:12px; }
.consent-row input[type=checkbox] { width:18px; height:18px; margin-top:2px; flex-shrink:0; cursor:pointer; }
.consent-row label { margin:0; font-size:14px; font-weight:600; color:#374151; cursor:pointer; line-height:1.5; }
.btn-submit { width:100%; padding:15px; background:#2563eb; color:#fff; border:none; border-radius:14px; font-size:17px; font-weight:800; cursor:pointer; margin-top:20px; letter-spacing:-0.3px; }
.btn-submit:hover { background:#1d4ed8; }
.footer-note { margin-top:16px; font-size:12px; color:#9ca3af; line-height:1.6; text-align:center; }

.form-group { margin: 20px 0; }
.form-group .title { display:block; font-size:14px; font-weight:700; color:#374151; margin:0 0 8px; }
.form-group small { display:block; font-size:12px; color:#6b7280; margin-top:6px; }
.chip input { display:none; }
.chip { display:inline-flex; align-items:center; justify-content:center; min-height:36px; padding:0 14px; margin:4px; border:1px solid #d1d5db; border-radius:999px; background:#fff; color:#374151; font-weight:700; cursor:pointer; }
.chip:has(input:checked) { background:#2563eb; color:#fff; border-color:#2563eb; }

@media (max-width:700px) {
  body { padding:16px; }
  .box { padding:24px; border-radius:16px; }
  h1 { font-size:22px; }
  .btn-submit { font-size:16px; padding:14px; }
}
  </style>
</head>
<body>
  <div class="box">
    <nav class="topnav">
      <a href="{{ url_for('index') }}">공고목록</a>
      <a href="{{ url_for('new_announcements') }}">신규공고</a>
      <a href="{{ url_for('projects_list') }}">전체공고</a>
      <a href="{{ url_for('company') }}">회사정보</a>
      <a href="{{ url_for('recommend') }}">맞춤추천</a>
      {% if is_admin|default(false) %}
      <a href="/admin/pipeline">파이프라인 실행</a>
      {% endif %}
    </nav>
    <h1>🏢 AI 추천을 위한 회사정보</h1>

    <div class="notice-box">
      📋 입력한 회사정보는 지원사업 추천을 위한 용도로만 사용됩니다.<br>
      자동 신청이나 외부 제출은 하지 않습니다.<br>
      AI 추천은 참고용이며, 최종 신청 여부는 사용자가 직접 확인해야 합니다.
    </div>

    <form method="POST" action="/company/save">
      <label for="company_name">회사명 *</label>
      <input id="company_name" name="company_name" placeholder="예: (주)전북수출" required>

      <div class="form-group">
        <label class="title">업종</label>
        <label class="chip"><input type="radio" name="industry" value="제조"> 제조</label>
        <label class="chip"><input type="radio" name="industry" value="IT·서비스"> IT·서비스</label>
        <label class="chip"><input type="radio" name="industry" value="유통·도소매"> 유통·도소매</label>
        <label class="chip"><input type="radio" name="industry" value="기타"> 기타</label>
      </div>
      <div id="industryOtherBox" class="form-group hidden">
        <label class="title">기타 업종 직접 입력</label>
        <input type="text" name="industry_other" id="industryOtherInput"
          placeholder="예: 화장품, 기계부품, 식품가공">
      </div>

      <label for="region">지역</label>
      <input id="region" name="region" placeholder="예: 전북, 전주" value="전북">

      <label for="export_flag">수출 여부</label>
      <select id="export_flag" name="export_flag">
        <option value="1">수출기업</option>
        <option value="0">내수기업</option>
      </select>

      <div class="form-group">
        <label class="title">인증 보유 개수</label>
        <input type="number" name="cert_count" min="0" max="5" value="0" placeholder="0~5개">
        <small>최대 5개까지 추천 점수에 반영됩니다.</small>
      </div>

      <div class="form-group">
        <label class="title">외국어 카탈로그 보유 개수</label>
        <input type="number" name="catalog_count" min="0" max="5" value="0" placeholder="0~5개">
        <small>최대 5개까지 추천 점수에 반영됩니다.</small>
      </div>

      <div class="form-group">
        <label class="title">가점 조건</label>
        <label class="chip">
          <input type="checkbox" name="social_enterprise" value="1">
          사회적기업
        </label>
        <label class="chip">
          <input type="checkbox" name="female_ceo" value="1">
          여성대표기업
        </label>
        <label class="chip">
          <input type="checkbox" name="export_tower" value="1">
          최근 3년 백만불 수출의 탑
        </label>
      </div>

      <label for="interest_keywords">관심 키워드</label>
      <input id="interest_keywords" name="interest_keywords" placeholder="예: 수출, 마케팅, R&D">

      <div class="consent-row">
        <input type="checkbox" name="consent" id="consent" required>
        <label for="consent">
          기업정보 수집 및 AI 추천 이용에 동의합니다.<br>
          <span style="font-weight:400;color:#6b7280;">수집 목적: 맞춤 지원사업 추천</span>
        </label>
      </div>

      <button class="btn-submit" type="submit">AI 추천 받기 →</button>
    </form>

    <div class="footer-note">
      ※ 현재 무료 테스트 운영 중 · 추천 조회는 12시간 5회 제한
    </div>
  </div>
  <script>
  (function () {
    const industryInputs = document.querySelectorAll('input[name="industry"]');
    const otherBox = document.getElementById("industryOtherBox");
    const otherInput = document.getElementById("industryOtherInput");

    function syncIndustryOther() {
      const checked = document.querySelector('input[name="industry"]:checked');
      const isOther = checked && checked.value === "기타";
      if (!otherBox) return;
      if (isOther) {
        otherBox.classList.remove("hidden");
        if (otherInput) otherInput.required = true;
      } else {
        otherBox.classList.add("hidden");
        if (otherInput) { otherInput.required = false; otherInput.value = ""; }
      }
    }

    industryInputs.forEach(input => input.addEventListener("change", syncIndustryOther));
    syncIndustryOther();
  })();
  </script>
</body>
</html>
