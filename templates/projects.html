<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>전체 공고 목록</title>
    <style>
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
            background: #f9fafb;
            color: #1f2937;
            font-size: 16px;
            line-height: 1.6;
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.4px;
            margin: 24px 0 18px;
        }

        .table-wrap {
            width: 100%;
            overflow-x: auto;
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 14px;
        }

        .project-table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            font-size: 15px;
        }

        .project-table th {
            background: #f3f4f6;
            color: #374151;
            font-weight: 700;
            padding: 13px 12px;
            text-align: center;
            border-bottom: 1px solid #e5e7eb;
            white-space: nowrap;
        }

        .project-table td {
            padding: 14px 12px;
            border-bottom: 1px solid #edf0f3;
            color: #374151;
            vertical-align: middle;
        }

        .project-table tbody tr:hover {
            background: #f9fafb;
        }

        .title-cell {
            width: 44%;
            min-width: 360px;
            font-size: 15px;
            font-weight: 700;
            color: #111827;
            line-height: 1.45;
            word-break: keep-all;
        }

        .org-cell {
            min-width: 180px;
            color: #4b5563;
            font-size: 14px;
            text-align: center;
        }

        .status-cell {
            min-width: 70px;
            text-align: center;
            font-size: 14px;
            color: #4b5563;
        }

        .date-cell {
            min-width: 90px;
            text-align: center;
            font-size: 14px;
            color: #6b7280;
        }

        .deadline-cell {
            min-width: 100px;
            text-align: center;
            font-size: 14px;
            color: #dc2626;
            font-weight: 700;
        }

        .action-cell {
            min-width: 80px;
            text-align: center;
        }

        .btn-detail {
            display: inline-block;
            padding: 7px 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            background: #fff;
            color: #2563eb;
            font-size: 13px;
            font-weight: 700;
            text-decoration: none;
            white-space: nowrap;
        }

        .btn-detail:hover {
            background: #eff6ff;
            text-decoration: none;
        }

        .nav,
        .navbar,
        .menu {
            font-size: 15px;
            font-weight: 600;
        }

        a {
            color: #2563eb;
            font-weight: 600;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .topnav { display: flex; flex-wrap: wrap; gap: 10px; margin: 8px 0 16px; padding: 10px 12px; background: #f8fafc; border: 1px solid #dbe4ee; border-radius: 8px; }
        .topnav a { text-decoration: none; color: #1d4ed8; font-weight: 600; }
        .topnav a:hover { text-decoration: underline; }

        @media (max-width: 700px) {
            body {
                font-size: 15px;
                padding: 10px;
            }

            h1 {
                font-size: 22px;
                margin: 18px 0 14px;
            }

            .table-wrap {
                border-radius: 12px;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }

            .project-table {
                min-width: 760px;
                font-size: 14px;
            }

            .title-cell {
                min-width: 300px;
                font-size: 14px;
                line-height: 1.45;
            }

            .org-cell,
            .status-cell,
            .date-cell,
            .deadline-cell {
                font-size: 13px;
            }

            .btn-detail {
                padding: 8px 12px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <h1>전체 공고 목록</h1>
    <nav class="topnav">
        <a href="{{ url_for('index') }}">공고목록</a>
        <a href="{{ url_for('new_announcements') }}">신규공고</a>
        <a href="{{ url_for('projects_list') }}">전체공고</a>
        <a href="{{ url_for('company') }}">회사정보</a>
        <a href="{{ url_for('recommend') }}">맞춤추천</a>
        <a href="{{ url_for('run_pipeline_route') }}">파이프라인 실행</a>
    </nav>

    <p>총 <strong>{{ rows|length }}</strong>건</p>

    <div class="table-wrap">
    <table class="project-table">
        <thead>
            <tr>
                <th>제목</th>
                <th>기관</th>
                <th>시작일</th>
                <th>마감일</th>
                <th>상태</th>
                <th>상세보기</th>
            </tr>
        </thead>
        <tbody>
            {% for row in rows %}
            <tr>
                <td class="title-cell">{{ row["title"] or "" }}</td>
                <td class="org-cell">{{ row["organization"] or "—" }}</td>
                <td class="date-cell">{{ row["start_date"] or "—" }}</td>
                <td class="deadline-cell">{{ row["end_date"] or "—" }}</td>
                <td class="status-cell">{{ row["status"] or "—" }}</td>
                <td class="action-cell"><a href="{{ url_for('project_detail', pid=row['id']) }}" class="btn-detail">보기</a></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    </div>
</body>
</html>
