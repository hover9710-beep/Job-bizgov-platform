<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>전체 공고 목록</title>
    <style>
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
            font-size: 16px;
            line-height: 1.6;
            color: #1f2937;
            background: #f9fafb;
        }

        h1 { font-size: 28px; font-weight: 800; margin: 24px 0 18px; letter-spacing: -0.4px; }

        .nav, .navbar, .menu { font-size: 15px; font-weight: 600; }

        table { width: 100%; border-collapse: collapse; background: #fff; font-size: 15px; border: 1px solid #e5e7eb; }
        th { background: #f3f4f6; color: #374151; font-weight: 700; padding: 12px 10px; text-align: left; border: 1px solid #e5e7eb; }
        td { padding: 12px 10px; border: 1px solid #e5e7eb; color: #374151; vertical-align: middle; }
        td:first-child, th:first-child { font-weight: 600; }

        a { color: #2563eb; font-weight: 600; text-decoration: none; }
        a:hover { text-decoration: underline; }
        tr:hover { background: #f9fafb; }

        td.title-cell { max-width: 480px; font-weight: 600; line-height: 1.45; word-break: keep-all; }

        .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

        @media (max-width: 700px) {
            body { font-size: 15px; padding: 10px; }
            h1 { font-size: 22px; }
            table { font-size: 14px; min-width: 720px; }
        }

        .topnav { display: flex; flex-wrap: wrap; gap: 10px; margin: 8px 0 16px; padding: 10px 12px; background: #f8fafc; border: 1px solid #dbe4ee; border-radius: 8px; }
        .topnav a { text-decoration: none; color: #1d4ed8; font-weight: 600; }
        .topnav a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>전체 공고 목록</h1>
    <nav class="topnav">
        <a href="{{ url_for('index') }}">공고목록</a>
        <a href="{{ url_for('new_announcements') }}">신규공고</a>
        <a href="{{ url_for('projects_list') }}">전체공고</a>
        <a href="{{ url_for('company') }}">회사정보</a>
        <a href="{{ url_for('recommend') }}">맞춤추천</a>
        <a href="{{ url_for('run_pipeline_route') }}">파이프라인 실행</a>
    </nav>

    <p>총 <strong>{{ rows|length }}</strong>건</p>

    <div class="table-wrap">
    <table>
        <thead>
            <tr>
                <th>제목</th>
                <th>기관</th>
                <th>시작일</th>
                <th>마감일</th>
                <th>상태</th>
                <th>상세보기</th>
            </tr>
        </thead>
        <tbody>
            {% for row in rows %}
            <tr>
                <td class="title-cell">{{ row["title"] or "" }}</td>
                <td>{{ row["organization"] or "—" }}</td>
                <td>{{ row["start_date"] or "—" }}</td>
                <td>{{ row["end_date"] or "—" }}</td>
                <td>{{ row["status"] or "—" }}</td>
                <td><a href="{{ url_for('project_detail', pid=row['id']) }}">보기</a></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    </div>
</body>
</html>
