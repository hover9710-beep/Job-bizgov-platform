<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>조회 한도 초과</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 24px; background: #f8fafc; color: #0f172a; }
    .box { max-width: 520px; margin: 40px auto; padding: 28px; background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; }
    .box h1 { font-size: 1.35rem; margin: 0 0 12px; }
    .box p { margin: 12px 0; line-height: 1.6; color: #334155; }
    .count { margin: 12px 0; font-weight: 600; color: #1e293b; }
    .box a { display: inline-block; margin-top: 16px; color: #2563eb; font-weight: 600; text-decoration: none; }
    .box a:hover { text-decoration: underline; }
    .reset { margin: 16px 0; padding: 14px; background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 12px; color: #1d4ed8; font-weight: 700; line-height: 1.6; }
    .reset strong { font-size: 20px; }
  </style>
</head>
<body>
  <div class="box">
    <h1>무료 조회 한도를 초과했습니다</h1>
    <p>무료 이용자는 {{ window_hours }}시간 동안 {{ limit }}회까지 추천 조회가 가능합니다.</p>
    <div class="count">사용 횟수: {{ used_count }}회 / {{ limit }}회</div>
    {% if reset_at %}
      <div class="reset">
        다시 이용 가능 시간<br>
        <strong>{{ reset_at }}</strong>
      </div>
    {% else %}
      <div class="reset">잠시 후 다시 시도해 주세요.</div>
    {% endif %}
    <p>공고 목록은 계속 확인할 수 있으며, 추천 조회만 제한됩니다.</p>
    <a href="/">공고 목록으로 돌아가기</a>
  </div>
</body>
</html>
