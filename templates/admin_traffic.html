<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>트래픽</title>
<style>
body {
  font-family: Pretendard, sans-serif;
  max-width: 600px;
  margin: 40px auto;
  padding: 16px;
  background: #f9fafb;
}
.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}
h2 { margin-bottom: 20px; }
.count { font-size: 20px; font-weight: 700; }
.total {
  background: #2563eb;
  color: white;
}
</style>
</head>
<body>
<h2>📊 오늘 방문 통계</h2>
{% for src, cnt in rows %}
<div class="card">
  <div>{{ src or 'unknown' }}</div>
  <div class="count">{{ cnt }}명</div>
</div>
{% endfor %}
<div class="card total">
  총 방문: {{ total }}명
</div>
</body>
</html>
