<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>검색 결과</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1100px;
            margin: 40px auto;
            line-height: 1.6;
        }
        .card {
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .btn {
            display: inline-block;
            margin-right: 10px;
            margin-top: 10px;
            padding: 10px 14px;
            border: 1px solid #ccc;
            border-radius: 8px;
            text-decoration: none;
            color: black;
        }
        .summary {
            color: #444;
        }
    </style>
</head>
<body>
    <h1>검색 결과</h1>
    <p>키워드: {{ keyword }}</p>

    {% for row in rows %}
    <div class="card">
        <h2>{{ row.title }}</h2>
        <p><strong>date:</strong> {{ row.date }}</p>
        <p class="summary">{{ row.summary[:300] if row.summary else "" }}</p>
        <p>{{ row.url }}</p>

        <a class="btn" href="{{ row.url }}" target="_blank">공고 보기</a>
        <a class="btn" href="/ai?project_id={{ row.id }}">AI 추천</a>
    </div>
    {% endfor %}

    <a class="btn" href="/">다시 검색</a>
</body>
</html>
