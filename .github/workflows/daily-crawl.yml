name: Daily BizGov Crawl

on:
  schedule:
    - cron: "0 21 * * *"   # UTC 21:00 = KST 06:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Crawl bizinfo (mode bizinfo + merge + DB)
        continue-on-error: true
        timeout-minutes: 15
        env:
          DB_PATH: db/biz.db
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python run_all.py --mode bizinfo

      - name: Crawl kstartup (collect only)
        continue-on-error: true
        timeout-minutes: 5
        env:
          DB_PATH: db/biz.db
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python connectors/connector_kstartup.py

      - name: Crawl AT global (collect only)
        continue-on-error: true
        timeout-minutes: 5
        env:
          DB_PATH: db/biz.db
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python connectors/connector_at_global.py

      - name: Crawl K-Seafood Trade (collect only)
        continue-on-error: true
        timeout-minutes: 5
        env:
          DB_PATH: db/biz.db
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python connectors/connector_kseafood.py

      - name: Crawl jbexport (proxy + mode jbexport + merge + DB)
        continue-on-error: true
        timeout-minutes: 15
        env:
          DB_PATH: db/biz.db
          PYTHONPATH: ${{ github.workspace }}
        run: |
          nohup python connectors/connectors_jbexport/jbexport_proxy.py > jbexport_proxy.log 2>&1 &
          PROXY_PID=$!
          sleep 5
          curl -sf http://127.0.0.1:5001 || echo "[warn] proxy not responding"
          python run_all.py --mode jbexport
          kill $PROXY_PID 2>/dev/null || true

      # DISABLED 2026-05-03: DB auto-push removed to prevent overwriting
      # dynamic tables (click_log, visit_log, companies, user_request_log,
      # recommendations) on production (Render).
      #
      # Issue: GitHub Actions runner DB is empty/sandbox. Pushing it would
      # replace production DB on next Render redeploy, losing all
      # user-generated data accumulated since the last commit.
      #
      # Crawl steps above still run for verification (DB writes go to the
      # ephemeral runner only and are discarded when the job ends).
      #
      # To re-enable safely, first implement one of:
      #   1. Split dynamic tables into a separate events.db (not git-tracked)
      #   2. Add a merge step that fetches production dynamic data before push
      #   3. Use Render Cron Jobs instead (same DB, no overwrite)
      - name: Crawl summary (no commit, no push)
        run: |
          echo "[ci] DB auto-push is DISABLED for dynamic-data safety."
          echo "[ci] Crawl ran in runner sandbox only. No commit, no push to main."
          if [ -f db/biz.db ]; then
            echo "[ci] runner db/biz.db size: $(stat -c%s db/biz.db) bytes (discarded)"
          fi
