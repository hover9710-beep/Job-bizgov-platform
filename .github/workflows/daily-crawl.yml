name: Daily BizGov Crawl

on:
  schedule:
    - cron: "0 21 * * *"   # UTC 21:00 = KST 06:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Crawl bizinfo (mode bizinfo + merge + DB)
        continue-on-error: true
        timeout-minutes: 15
        env:
          DB_PATH: db/biz.db
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python run_all.py --mode bizinfo

      - name: Crawl kstartup (collect only)
        continue-on-error: true
        timeout-minutes: 5
        env:
          DB_PATH: db/biz.db
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python connectors/connector_kstartup.py

      - name: Crawl jbexport (proxy + mode jbexport + merge + DB)
        continue-on-error: true
        timeout-minutes: 15
        env:
          DB_PATH: db/biz.db
          PYTHONPATH: ${{ github.workspace }}
        run: |
          nohup python connectors/connectors_jbexport/jbexport_proxy.py > jbexport_proxy.log 2>&1 &
          PROXY_PID=$!
          sleep 5
          curl -sf http://127.0.0.1:5001 || echo "[warn] proxy not responding"
          python run_all.py --mode jbexport
          kill $PROXY_PID 2>/dev/null || true

      - name: Commit updated data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add db/biz.db data || true
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: daily auto crawl data update"
            git push
          fi
